<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Garçom</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config/auth.js"></script>
    <link rel="stylesheet" href="css/cardapio.css">
</head>

<body>

    <header>
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/Burger_King_2020.svg" class="logo" alt="Logo">
        </div>

        <nav class="desktop-menu">
            <a href="garcom.html" title="Início"><i class="fas fa-close"></i></a>
        </nav>
    </header>

    <main>
        <div class="header-cardapio">
            <h1 id="numero-mesa">Mesa --</h1>
        </div>

        <div class="boxAlimento">
            <h3>hambugues</h3>
            <div class=" hamburguers">

            </div>

            <h3>pizzas</h3>
            <div class="pizzas">

            </div>

            <h3>bebidas</h3>
            <div class="bebidas">

            </div>
        </div>
    </main>

    <footer class="footer-final">
        <div class="opcoes">
            <div class="caixa-total">
                <span class="label-total">Total</span>
                <span id="valor-total" class="valor-total">R$ 0,00</span>
            </div>
            <button class="btn-ok">OK</button>
        </div>
    </footer>

    <div id="modal-revisao" class="modal">
        <div class="modal-content">
            <header class="header-modal">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/Burger_King_2020.svg" class="logo-modal"
                    alt="Logo">
            </header>

            <div class="modal-body">
                <h2 id="mesa-revisao-titulo">Mesa --</h2>

                <h3 class="secao-titulo">Selecionados</h3>
                <div id="lista-revisao" class="lista-itens-revisao">
                </div>
            </div>

            <footer class="footer-modal">
                <div class="caixa-total-modal">
                    <span class="label-total">Total</span>
                    <span id="total-modal" class="valor-total">R$ 0,00</span>
                </div>
                <button class="btn-finalizar" onclick="verificarBebidasAntesDeEnviar()">FINALIZAR PEDIDO</button>
                <button class="btn-voltar-modal" onclick="fecharModal()">VOLTAR</button>
            </footer>
        </div>
    </div>

    <div id="modal-bebida" class="modal" style="display: none;">
        <div class="modal-content" style="max-height: 350px; border-radius: 30px; margin: auto; width: 90%;">
            <div class="header-modal" style="border-radius: 30px 30px 0 0;">
                <h3 style="color: #fff; font-family: 'Arial Black'; margin: 0; font-size: 16px;">SOBRE A BEBIDA</h3>
            </div>
            <div class="modal-body"
                style="background: #000; color: #fff; display: flex; flex-direction: column; gap: 20px; padding: 30px;">

                <label style="display: flex; align-items: center; gap: 15px; font-weight: 900; cursor: pointer;">
                    <input type="radio" name="pref-bebida" value="Junto com a comida" checked
                        style="accent-color: #ed7d31; transform: scale(1.5);">
                    JUNTO COM A COMIDA
                </label>

                <label style="display: flex; align-items: center; gap: 15px; font-weight: 900; cursor: pointer;">
                    <input type="radio" name="pref-bebida" value="Entregar agora"
                        style="accent-color: #ed7d31; transform: scale(1.5);">
                    ENTREGAR AGORA
                </label>

                <button class="btn-finalizar" onclick="confirmarPedidoComPreferencia()"
                    style="margin-top: 10px;">Finalizar Pedido</button>
                <button class="btn-voltar-modal" onclick="fecharModalBebida()"
                    style="background: #fff; color: #000;">Voltar</button>
            </div>
        </div>
    </div>

    <script src="js/produtos.js"></script>
    <script src="js/cardapio.js"></script>
</body>

</html>
