<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Funcionário</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config/auth.js"></script>
    <link rel="stylesheet" href="css/estilo-padrao.css">
    <link rel="stylesheet" href="css/consultar.css">
</head>

<body>

    <header>
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/Burger_King_2020.svg" class="logo" alt="Logo">
        </div>

        <nav class="desktop-menu">
            <a href="gerente.html" title="Início"><i class="fas fa-home"></i></a>
            <a href="cadastrar-funcionario.html" title="Cadastrar Funcionário"><i class="fas fa-user-plus"></i></a>
            <a href="vendas.html" title="Vendas"><i class="fas fa-chart-line"></i></a>
            <a href="historico.html" title="Histórico"><i class="fas fa-history"></i></a>
            <button onclick="logout()" class="btn-sair-topo" title="Sair"><i class="fas fa-power-off"></i></button>
        </nav>

        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <span>MENU GERENTE</span>
            <button onclick="toggleMenu()" class="close-btn">&times;</button>
        </div>

        <nav class="menu-links">
            <a href="gerente.html"><i class="fas fa-home"></i> PAINEL PRINCIPAL</a>
            <a href="cadastrar-funcionario.html"><i class="fas fa-user-plus"></i> CADASTRAR FUNCIONÁRIO</a>
            <a href="vendas.html"><i class="fas fa-chart-line"></i> VENDAS</a>
            <a href="historico.html"><i class="fas fa-history"></i> HISTÓRICO DE PAGAMENTOS</a>
        </nav>

        <button onclick="logout()" class="logout-btn">
            <i class="fas fa-power-off"></i> SAIR DO SISTEMA
        </button>
    </div>

    <main class="container">
        <div class="card-consulta">
            <h2><i class="fas fa-users"></i> Equipe Cadastrada</h2>
            <p>Visualize e gerencie todos os funcionários do sistema.</p>

            <div class="table-responsive">
                <table class="tabela-estilizada">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Cargo</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-funcionarios">
                        <tr>
                            <td colspan="4" class="text-center">Carregando dados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-edit"></i> Editar Funcionário</h3>
                <span class="close-modal" onclick="fecharModal()">&times;</span>
            </div>
            <form id="form-editar">
                <input type="hidden" id="edit-uid">
                <div class="input-group">
                    <label>Nome:</label>
                    <input type="text" id="edit-nome" required>
                </div>
                <div class="input-group">
                    <label>Cargo:</label>
                    <select id="edit-cargo">
                        <option value="GERENTE">GERENTE</option>
                        <option value="GARCOM">GARÇOM</option>
                        <option value="COZINHA">COZINHA</option>
                        <option value="BARMAN">BARMAN</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/estilo-padrao.js"></script>
    <script src="js/consultar-funcionario.js"></script>
</body>

</html>
