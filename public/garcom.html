<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Garçom</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config/auth.js"></script>
    <link rel="stylesheet" href="css/estilo-padrao.css">
    <link rel="stylesheet" href="css/garcom.css">
</head>

<body>

    <header>
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/Burger_King_2020.svg" class="logo" alt="Logo">
        </div>

        <nav class="desktop-menu">
            <a href="garcom.html" title="Início"><i class="fas fa-home"></i></a>
            <a href="garcom-pedidos.html" title="Início"><i class="fas fa-clipboard-list"></i></a>
            <button onclick="logout()" class="btn-sair-topo" title="Sair"><i class="fas fa-power-off"></i></button>
        </nav>

        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <span>MENU GERENTE</span>
            <button onclick="toggleMenu()" class="close-btn">&times;</button>
        </div>

        <nav class="menu-links">
            <a href="garcom.html"><i class="fas fa-home"></i> PAINEL PRINCIPAL</a>
            <a href="garcom-pedidos.html" title="Início"><i class="fas fa-clipboard-list"></i>PEDIDOS</a>
        </nav>

        <button onclick="logout()" class="logout-btn">
            <i class="fas fa-power-off"></i> SAIR DO SISTEMA
        </button>
    </div>

    <main class="container">
        <section class="secao-mesas">
            <h2 class="titulo-sessao">Mapa das mesas</h2>

            <div class="filtros-mesas">
                <input type="text" id="buscaMesa" placeholder="PESQUISAR..." onkeyup="filtrarMesas()">
                <select id="filtroStatus" onchange="filtrarMesas()">
                    <option value="TODAS">TODAS</option>
                    <option value="LIVRE">LIVRE</option>
                    <option value="OCUPADA">OCUPADA</option>
                </select>
            </div>

            <div class="grid-mesas" id="container-mesas">
                
            </div>

            <div class="pedido-sem-mesa">
                <button class="btn-sem-mesa">
                    <span>PEDIDO SEM MESA</span>
                    <i class="fas fa-bell-concierge"></i>
                </button>
            </div>
        </section>
    </main>

    <script src="js/estilo-padrao.js"></script>
    <script src="js/garcom.js"></script>
    <script src="js/produtos.js"></script>
    <script src="notificacao/NotificacaoGarcom.js"></script>
</body>

</html>
